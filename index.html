<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FONTS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Felipa&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bg-[#f8f1e7] overflow-x-hidden">
    <!-- ================= HERO ================= -->
    <section
      id="hero"
      class="relative h-[100svh] w-full overflow-hidden cursor-pointer min-h-screen"
    >
      <!-- VIDEO -->
      <video
        id="video"
        src="./assets/curtain-video.mp4"
        class="absolute inset-0 w-full h-full object-cover opacity-0 z-0 transition-opacity duration-300"
        muted
        playsinline
      ></video>

      <!-- IMAGE -->
      <img
        id="fallback"
        src="./assets/curtain-closed.jpg"
        class="absolute inset-0 w-full h-full object-cover z-0 transition-opacity duration-300"
      />

      <!-- TAP -->
      <div
        id="tapHint"
        class="absolute inset-0 flex flex-col items-center justify-center z-30 pointer-events-none"
      >
        <div
          class="tap-circle flex items-center justify-center w-[60px] h-[60px] sm:w-[70px] sm:h-[70px] rounded-full border border-white/70 text-white text-xl sm:text-2xl backdrop-blur-sm"
        >
          🫵🏻
        </div>

        <p class="mt-3 text-white text-[11px] tracking-wide font-[Cinzel]">
          Tap to continue
        </p>
      </div>

      <!-- CONTENT -->
      <div
        id="heroContent"
        class="absolute inset-0 flex items-center justify-center text-center z-20 opacity-0 transition-opacity duration-700 px-4"
      >
        <div
          class="space-y-2 sm:space-y-4 max-w-[600px] w-full mx-auto mt-[18vh]"
        >
          <p
            class="hero-text font-[Cinzel] text-[12px] sm:text-[18px] tracking-wide text-[#7a1f1f]"
          >
            You are cordially invited to celebrate the wedding of
          </p>

          <h1
            class="hero-text font-[Felipa] text-[32px] sm:text-[60px] text-[#7a1f1f]"
          >
            Reshma Satya
          </h1>

          <span class="hero-text block text-lg text-[#7a1f1f]">&</span>

          <h1
            class="hero-text font-[Felipa] text-[32px] sm:text-[60px] text-[#7a1f1f]"
          >
            Phani Kumar Viyyuri
          </h1>

          <p
            class="hero-text font-[Cinzel] text-[11px] sm:text-[16px] tracking-wide text-[#7a1f1f]"
          >
            We would like to invite you to celebrate with us the most special
            day of our life.
          </p>
        </div>
      </div>

      <!-- SCROLL -->
      <div
        id="scrollHint"
        class="absolute bottom-6 left-0 right-0 flex justify-center opacity-0 transition-opacity duration-700 z-10"
      >
        <div class="flex flex-col items-center scroll-float">
          <p
            class="font-[Cinzel] text-[10px] tracking-[0.2em] uppercase text-[#5C2018]"
          >
            Scroll
          </p>

          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#5C2018"
            stroke-width="1.5"
          >
            <path d="M12 5v14M5 12l7 7 7-7"></path>
          </svg>
        </div>
      </div>

      <!-- CURTAIN -->
      <div
        id="curtainWrapper"
        class="absolute inset-0 z-20 pointer-events-none"
      >
        <div
          id="leftCurtain"
          class="curtain absolute top-0 left-0 h-full w-[50%]"
        ></div>
        <div
          id="rightCurtain"
          class="curtain absolute top-0 right-0 h-full w-[50%]"
        ></div>
      </div>
    </section>

    <!-- ================= REVEAL SECTION ================= -->

    <section
      class="min-h-screen flex flex-col items-center justify-center py-10 px-6 bg-[#faf8f5]"
    >
      <!-- Instruction -->
      <div class="mb-6 flex flex-col items-center">
        <div class="relative flex items-center justify-center">
          <div
            class="absolute w-10 h-10 rounded-full border border-[#5C2018]/30 scale-140"
          ></div>

          <div
            class="w-10 h-10 rounded-full flex items-center justify-center bg-[#5C2018]/10 border border-[#5C2018]/20"
          >
            ❤️
          </div>
        </div>

        <p
          class="mt-3 font-[Cinzel] text-xs tracking-wide text-[#5C2018]/70 text-center"
        >
          Scratch all three circles to continue
        </p>
      </div>

      <!-- Heading -->
      <div class="text-center mb-10">
        <h2 class="font-[Felipa] text-4xl md:text-5xl text-[#5C2018] mb-3">
          Reveal
        </h2>

        <p
          class="font-[Cinzel] text-sm tracking-[0.15em] uppercase text-[#5C2018]"
        >
          Scratch to discover the date
        </p>
      </div>

      <!-- Scratch Cards -->
      <div class="flex gap-8 md:gap-12">
        <!-- DAY -->
        <div class="flex flex-col items-center">
          <div
            class="relative w-28 h-28 md:w-32 md:h-32 rounded-full overflow-hidden"
          >
            <div
              class="absolute inset-0 flex items-center justify-center bg-[#faf8f5]"
            >
              <span class="font-[Felipa] text-2xl md:text-3xl text-[#5C2018]">
                10
              </span>
            </div>

            <canvas
              class="absolute inset-0 w-full h-full cursor-pointer transition-opacity duration-700"
            ></canvas>
          </div>
        </div>

        <!-- MONTH -->
        <div class="flex flex-col items-center">
          <div
            class="relative w-28 h-28 md:w-32 md:h-32 rounded-full overflow-hidden"
          >
            <div
              class="absolute inset-0 flex items-center justify-center bg-[#faf8f5]"
            >
              <span class="font-[Felipa] text-2xl md:text-3xl text-[#5C2018]">
                May
              </span>
            </div>

            <canvas
              class="absolute inset-0 w-full h-full cursor-pointer transition-opacity duration-700"
            ></canvas>
          </div>
        </div>

        <!-- YEAR -->
        <div class="flex flex-col items-center">
          <div
            class="relative w-28 h-28 md:w-32 md:h-32 rounded-full overflow-hidden"
          >
            <div
              class="absolute inset-0 flex items-center justify-center bg-[#faf8f5]"
            >
              <span class="font-[Felipa] text-2xl md:text-3xl text-[#5C2018]">
                2026
              </span>
            </div>

            <canvas
              class="absolute inset-0 w-full h-full cursor-pointer transition-opacity duration-700"
            ></canvas>
          </div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
