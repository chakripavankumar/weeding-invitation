<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Invitation</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Felipa&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="bg-[#f8f1e7] overflow-x-hidden">
    <section
      id="hero"
      class="relative h-[100svh] w-full overflow-hidden cursor-pointer"
    >
      <!-- VIDEO -->
      <video
        id="video"
        src="./assets/curtain-video.mp4"
        class="absolute inset-0 w-full h-full object-cover opacity-0 z-0 transition-opacity duration-300"
        muted
        playsinline
      ></video>

      <!-- IMAGE -->
      <img
        id="fallback"
        src="./assets/curtain-closed.jpg"
        class="absolute inset-0 w-full h-full object-cover z-0 transition-opacity duration-300"
      />

      <!-- TAP -->
      <div
        id="tapHint"
        class="absolute inset-0 flex flex-col items-center justify-center z-30 pointer-events-none"
      >
        <div
          class="tap-circle flex items-center justify-center w-[60px] h-[60px] sm:w-[70px] sm:h-[70px] rounded-full border border-white/70 text-white text-xl sm:text-2xl backdrop-blur-sm"
        >
          🫵🏻
        </div>

        <p class="mt-3 text-white text-[11px] tracking-wide font-[Cinzel]">
          Tap to continue
        </p>
      </div>

      <!-- CONTENT -->
      <div
        id="heroContent"
        class="absolute inset-0 flex items-center justify-center text-center z-10 opacity-0 transition-opacity duration-700 px-4"
      >
        <div
          id="contentWrapper"
          class="space-y-2 sm:space-y-4 max-w-[600px] w-full mx-auto"
        >
          <p
            class="hero-text font-[Cinzel] text-[12px] sm:text-[18px] tracking-wide text-[#7a1f1f] leading-snug"
          >
            You are cordially invited to <br class="sm:hidden" />
            celebrate the wedding of
          </p>

          <h1
            class="hero-text font-[Felipa] text-[32px] sm:text-[60px] text-[#7a1f1f] leading-tight"
          >
            Reshma Satya
          </h1>

          <span class="hero-text block text-lg text-[#7a1f1f] my-1">&</span>

          <h1
            class="hero-text font-[Felipa] text-[32px] sm:text-[60px] text-[#7a1f1f] leading-tight"
          >
            Snake Kumar
          </h1>

          <p
            class="hero-text font-[Cinzel] text-[11px] sm:text-[16px] tracking-wide text-[#7a1f1f] leading-relaxed max-w-[90%] mx-auto"
          >
            We would like to invite you to celebrate with us the most special
            day of our life.
          </p>
        </div>
      </div>

      <!-- SCROLL -->
      <div
        id="scrollHint"
        class="absolute bottom-6 left-0 right-0 flex justify-center opacity-0 transition-opacity duration-700 z-10"
      >
        <div class="flex flex-col items-center scroll-float">
          <p
            class="font-[Cinzel] text-[10px] tracking-[0.2em] uppercase text-[#5C2018]"
          >
            Scroll
          </p>

          <svg
            class="mt-2"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#5C2018"
            stroke-width="1.5"
          >
            <path d="M12 5v14M5 12l7 7 7-7"></path>
          </svg>
        </div>
      </div>

      <!-- CURTAIN -->
      <div
        id="curtainWrapper"
        class="absolute inset-0 z-20 pointer-events-none"
      >
        <div
          id="leftCurtain"
          class="curtain absolute top-0 left-0 h-full w-[50%]"
        ></div>
        <div
          id="rightCurtain"
          class="curtain absolute top-0 right-0 h-full w-[50%]"
        ></div>
      </div>

      <div
        id="contentWrapper"
        class="space-y-3 max-w-[600px] w-full px-6 mx-auto"
      ></div>
    </section>

    <!-- NEXT SECTION -->
    <section
      class="min-h-screen bg-[#f8f1e7] flex items-center justify-center text-center px-6"
    >
      <div>
        <h2 class="font-[Felipa] text-4xl text-[#7a1f1f]">Reveal Section</h2>
        <p class="mt-4 font-[Cinzel] text-sm text-[#7a1f1f]">
          This is where your next content begins
        </p>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
